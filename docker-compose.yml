services:
  db:
    image: postgres:16
    container_name: bi-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-bi_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - Servidores

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bi-app
    restart: always
    ports:
      - "8089:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-bi_platform}?schema=public
      # Oracle connection (assumed to be Thin mode using the string directly)
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_CONNECT_STRING: ${DB_CONNECT_STRING}
    depends_on:
      - db
    networks:
      - Servidores

  cron:
    build:
      context: .
      dockerfile: Dockerfile.cron
    container_name: bi-cron
    restart: always
    depends_on:
      - app
    networks:
      - Servidores

volumes:
  postgres_data:


networks:
  Servidores:
    external: true
